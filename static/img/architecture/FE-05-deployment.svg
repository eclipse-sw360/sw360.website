<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 820 450" font-family="Inter, Arial, sans-serif" font-size="12">
  <defs>
    <marker id="a5" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto"><polygon points="0 0, 8 3, 0 6" fill="#475569"/></marker>
  </defs>
  <text x="410" y="28" text-anchor="middle" font-size="15" font-weight="bold" fill="#1e293b">SW360 Frontend — Deployment Architecture (Docker)</text>
  <!-- Docker network boundary -->
  <rect x="120" y="60" width="670" height="370" rx="14" fill="#f8fafc" stroke="#94a3b8" stroke-width="2" stroke-dasharray="8,4"/>
  <text x="455" y="82" text-anchor="middle" fill="#64748b" font-size="11" font-style="italic">Docker Network: sw360net</text>
  <!-- Browser (external) -->
  <rect x="10" y="155" width="90" height="55" rx="8" fill="#f0f4ff" stroke="#4a6fa5" stroke-width="2"/>
  <text x="55" y="178" text-anchor="middle" font-size="18">&#x1F310;</text>
  <text x="55" y="198" text-anchor="middle" fill="#334155" font-size="10" font-weight="bold">Browser</text>
  <!-- Frontend container -->
  <rect x="150" y="120" width="190" height="120" rx="10" fill="#dbeafe" stroke="#2563eb" stroke-width="2"/>
  <text x="245" y="145" text-anchor="middle" font-weight="bold" fill="#1e40af" font-size="13">sw360-frontend</text>
  <text x="245" y="165" text-anchor="middle" fill="#3b82f6">Next.js 16 (Standalone)</text>
  <text x="245" y="183" text-anchor="middle" fill="#64748b" font-size="11">Node.js 24-slim</text>
  <rect x="195" y="195" width="100" height="22" rx="4" fill="#bfdbfe" stroke="#60a5fa" stroke-width="1"/>
  <text x="245" y="210" text-anchor="middle" fill="#1e40af" font-size="10" font-weight="bold">:3000</text>
  <!-- Backend container -->
  <rect x="420" y="120" width="190" height="120" rx="10" fill="#dcfce7" stroke="#16a34a" stroke-width="2"/>
  <text x="515" y="145" text-anchor="middle" font-weight="bold" fill="#166534" font-size="13">sw360-backend</text>
  <text x="515" y="165" text-anchor="middle" fill="#22c55e">Spring Boot 4.x</text>
  <text x="515" y="183" text-anchor="middle" fill="#64748b" font-size="11">Java 21 + Thrift</text>
  <rect x="460" y="195" width="110" height="22" rx="4" fill="#bbf7d0" stroke="#4ade80" stroke-width="1"/>
  <text x="515" y="210" text-anchor="middle" fill="#166534" font-size="10" font-weight="bold">:8080 / :11311</text>
  <!-- Keycloak container -->
  <rect x="150" y="290" width="190" height="110" rx="10" fill="#fef3c7" stroke="#d97706" stroke-width="2"/>
  <text x="245" y="315" text-anchor="middle" font-weight="bold" fill="#92400e" font-size="13">keycloak</text>
  <text x="245" y="335" text-anchor="middle" fill="#d97706">Keycloak 26.x</text>
  <text x="245" y="353" text-anchor="middle" fill="#64748b" font-size="11">OAuth2 / OIDC</text>
  <rect x="195" y="362" width="100" height="22" rx="4" fill="#fde68a" stroke="#f59e0b" stroke-width="1"/>
  <text x="245" y="377" text-anchor="middle" fill="#92400e" font-size="10" font-weight="bold">:8083</text>
  <!-- CouchDB container -->
  <rect x="420" y="290" width="190" height="110" rx="10" fill="#f3f4f6" stroke="#6b7280" stroke-width="2"/>
  <text x="515" y="315" text-anchor="middle" font-weight="bold" fill="#374151" font-size="13">couchdb</text>
  <text x="515" y="335" text-anchor="middle" fill="#6b7280">CouchDB 3.4</text>
  <text x="515" y="353" text-anchor="middle" fill="#64748b" font-size="11">Document Database</text>
  <rect x="465" y="362" width="100" height="22" rx="4" fill="#e5e7eb" stroke="#9ca3af" stroke-width="1"/>
  <text x="515" y="377" text-anchor="middle" fill="#374151" font-size="10" font-weight="bold">:5984</text>
  <!-- PostgreSQL container -->
  <rect x="660" y="290" width="110" height="110" rx="10" fill="#ede9fe" stroke="#7c3aed" stroke-width="2"/>
  <text x="715" y="315" text-anchor="middle" font-weight="bold" fill="#5b21b6" font-size="12">postgresql</text>
  <text x="715" y="335" text-anchor="middle" fill="#7c3aed" font-size="11">PostgreSQL</text>
  <text x="715" y="353" text-anchor="middle" fill="#64748b" font-size="10">(Keycloak DB)</text>
  <rect x="675" y="362" width="80" height="22" rx="4" fill="#ddd6fe" stroke="#a78bfa" stroke-width="1"/>
  <text x="715" y="377" text-anchor="middle" fill="#5b21b6" font-size="10" font-weight="bold">:5432</text>
  <!-- Arrows -->
  <!-- Browser -> Frontend -->
  <line x1="100" y1="180" x2="145" y2="180" stroke="#475569" stroke-width="2" marker-end="url(#a5)"/>
  <text x="122" y="172" text-anchor="middle" fill="#475569" font-size="9">HTTPS</text>
  <!-- Frontend -> Backend -->
  <line x1="340" y1="180" x2="415" y2="180" stroke="#475569" stroke-width="2" marker-end="url(#a5)"/>
  <text x="377" y="170" text-anchor="middle" fill="#475569" font-size="9">REST API</text>
  <!-- Frontend -> Keycloak -->
  <line x1="245" y1="240" x2="245" y2="285" stroke="#d97706" stroke-width="2" marker-end="url(#a5)"/>
  <text x="220" y="265" fill="#d97706" font-size="9">OIDC</text>
  <!-- Backend -> CouchDB -->
  <line x1="515" y1="240" x2="515" y2="285" stroke="#475569" stroke-width="2" marker-end="url(#a5)"/>
  <text x="530" y="265" fill="#475569" font-size="9">HTTP</text>
  <!-- Keycloak -> PostgreSQL -->
  <line x1="340" y1="345" x2="655" y2="345" stroke="#7c3aed" stroke-width="1.5" marker-end="url(#a5)"/>
  <text x="497" y="338" text-anchor="middle" fill="#7c3aed" font-size="9">JDBC</text>
</svg>
