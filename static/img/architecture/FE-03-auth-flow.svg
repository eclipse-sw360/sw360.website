<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 480" font-family="Inter, Arial, sans-serif" font-size="11">
  <defs>
    <marker id="arrow3" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto"><polygon points="0 0, 8 3, 0 6" fill="#555"/></marker>
  </defs>
  <text x="450" y="25" text-anchor="middle" font-size="16" font-weight="bold" fill="#1f2937">SW360 Frontend — Authentication Flow</text>
  <!-- Participants -->
  <rect x="60" y="45" width="80" height="30" rx="4" fill="#f0f4ff" stroke="#4a6fa5" stroke-width="1.5"/>
  <text x="100" y="64" text-anchor="middle" font-weight="bold" fill="#333">User</text>
  <rect x="200" y="45" width="100" height="30" rx="4" fill="#dbeafe" stroke="#2563eb" stroke-width="1.5"/>
  <text x="250" y="64" text-anchor="middle" font-weight="bold" fill="#1e40af">Browser</text>
  <rect x="370" y="45" width="110" height="30" rx="4" fill="#dcfce7" stroke="#16a34a" stroke-width="1.5"/>
  <text x="425" y="64" text-anchor="middle" font-weight="bold" fill="#166534">Next.js</text>
  <rect x="550" y="45" width="110" height="30" rx="4" fill="#fef3c7" stroke="#d97706" stroke-width="1.5"/>
  <text x="605" y="64" text-anchor="middle" font-weight="bold" fill="#92400e">Keycloak</text>
  <rect x="730" y="45" width="120" height="30" rx="4" fill="#dcfce7" stroke="#16a34a" stroke-width="1.5"/>
  <text x="790" y="64" text-anchor="middle" font-weight="bold" fill="#166534">SW360 API</text>
  <!-- Lifelines -->
  <line x1="100" y1="75" x2="100" y2="460" stroke="#ccc" stroke-width="1" stroke-dasharray="4"/>
  <line x1="250" y1="75" x2="250" y2="460" stroke="#ccc" stroke-width="1" stroke-dasharray="4"/>
  <line x1="425" y1="75" x2="425" y2="460" stroke="#ccc" stroke-width="1" stroke-dasharray="4"/>
  <line x1="605" y1="75" x2="605" y2="460" stroke="#ccc" stroke-width="1" stroke-dasharray="4"/>
  <line x1="790" y1="75" x2="790" y2="460" stroke="#ccc" stroke-width="1" stroke-dasharray="4"/>
  <!-- Steps -->
  <line x1="100" y1="100" x2="245" y2="100" stroke="#555" stroke-width="1.5" marker-end="url(#arrow3)"/>
  <text x="172" y="93" text-anchor="middle" fill="#333" font-size="10">Navigate to /home</text>
  <line x1="250" y1="120" x2="420" y2="120" stroke="#555" stroke-width="1.5" marker-end="url(#arrow3)"/>
  <text x="335" y="113" text-anchor="middle" fill="#333" font-size="10">GET /en/home</text>
  <rect x="395" y="130" width="60" height="20" rx="3" fill="#f3f4f6" stroke="#d1d5db"/>
  <text x="425" y="144" text-anchor="middle" fill="#555" font-size="9">proxy.ts</text>
  <line x1="425" y1="160" x2="250" y2="160" stroke="#dc2626" stroke-width="1.5" marker-end="url(#arrow3)"/>
  <text x="337" y="153" text-anchor="middle" fill="#dc2626" font-size="10">Redirect (no session)</text>
  <line x1="250" y1="190" x2="420" y2="190" stroke="#555" stroke-width="1.5" marker-end="url(#arrow3)"/>
  <text x="335" y="183" text-anchor="middle" fill="#333" font-size="10">POST /api/auth/signin</text>
  <line x1="425" y1="210" x2="600" y2="210" stroke="#d97706" stroke-width="1.5" marker-end="url(#arrow3)"/>
  <text x="512" y="203" text-anchor="middle" fill="#d97706" font-size="10">OAuth2 Auth Code Request</text>
  <line x1="605" y1="230" x2="250" y2="230" stroke="#d97706" stroke-width="1.5" marker-end="url(#arrow3)"/>
  <text x="427" y="223" text-anchor="middle" fill="#d97706" font-size="10">Login page</text>
  <line x1="100" y1="260" x2="245" y2="260" stroke="#555" stroke-width="1.5" marker-end="url(#arrow3)"/>
  <text x="172" y="253" text-anchor="middle" fill="#333" font-size="10">Enter credentials</text>
  <line x1="250" y1="280" x2="600" y2="280" stroke="#d97706" stroke-width="1.5" marker-end="url(#arrow3)"/>
  <text x="425" y="273" text-anchor="middle" fill="#d97706" font-size="10">Submit credentials</text>
  <line x1="605" y1="300" x2="430" y2="300" stroke="#16a34a" stroke-width="1.5" marker-end="url(#arrow3)"/>
  <text x="517" y="293" text-anchor="middle" fill="#16a34a" font-size="10">Auth code → tokens (JWT)</text>
  <rect x="390" y="310" width="70" height="20" rx="3" fill="#dcfce7" stroke="#4ade80"/>
  <text x="425" y="324" text-anchor="middle" fill="#166534" font-size="9">NextAuth</text>
  <line x1="425" y1="340" x2="250" y2="340" stroke="#16a34a" stroke-width="1.5" marker-end="url(#arrow3)"/>
  <text x="337" y="333" text-anchor="middle" fill="#16a34a" font-size="10">Set JWT session cookie</text>
  <line x1="250" y1="370" x2="420" y2="370" stroke="#555" stroke-width="1.5" marker-end="url(#arrow3)"/>
  <text x="335" y="363" text-anchor="middle" fill="#333" font-size="10">GET /en/home (with cookie)</text>
  <line x1="425" y1="390" x2="785" y2="390" stroke="#2563eb" stroke-width="1.5" marker-end="url(#arrow3)"/>
  <text x="605" y="383" text-anchor="middle" fill="#2563eb" font-size="10">GET /api/... (Bearer token)</text>
  <line x1="790" y1="410" x2="430" y2="410" stroke="#16a34a" stroke-width="1.5" marker-end="url(#arrow3)"/>
  <text x="610" y="403" text-anchor="middle" fill="#16a34a" font-size="10">HAL+JSON response</text>
  <line x1="425" y1="430" x2="250" y2="430" stroke="#555" stroke-width="1.5" marker-end="url(#arrow3)"/>
  <text x="337" y="423" text-anchor="middle" fill="#333" font-size="10">Rendered page</text>
</svg>

