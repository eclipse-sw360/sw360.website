<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 700 520" font-family="Inter, Arial, sans-serif" font-size="12">
  <defs>
    <marker id="arrow2" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto"><polygon points="0 0, 8 3, 0 6" fill="#555"/></marker>
  </defs>
  <text x="350" y="25" text-anchor="middle" font-size="16" font-weight="bold" fill="#1f2937">SW360 Frontend — Layer Architecture</text>
  <!-- Browser Layer -->
  <rect x="40" y="50" width="620" height="150" rx="10" fill="#eff6ff" stroke="#2563eb" stroke-width="2"/>
  <text x="60" y="72" font-weight="bold" fill="#1e40af" font-size="14">Browser (Client-Side)</text>
  <rect x="60" y="85" width="140" height="50" rx="6" fill="#dbeafe" stroke="#60a5fa" stroke-width="1.5"/>
  <text x="130" y="107" text-anchor="middle" font-weight="bold" fill="#1e40af">Pages</text>
  <text x="130" y="123" text-anchor="middle" fill="#666" font-size="10">src/app/[locale]/*</text>
  <rect x="215" y="85" width="140" height="50" rx="6" fill="#dbeafe" stroke="#60a5fa" stroke-width="1.5"/>
  <text x="285" y="107" text-anchor="middle" font-weight="bold" fill="#1e40af">Components</text>
  <text x="285" y="123" text-anchor="middle" fill="#666" font-size="10">src/components/</text>
  <rect x="370" y="85" width="130" height="50" rx="6" fill="#dbeafe" stroke="#60a5fa" stroke-width="1.5"/>
  <text x="435" y="107" text-anchor="middle" font-weight="bold" fill="#1e40af">Hooks</text>
  <text x="435" y="123" text-anchor="middle" fill="#666" font-size="10">src/hooks/</text>
  <rect x="515" y="85" width="130" height="50" rx="6" fill="#dbeafe" stroke="#60a5fa" stroke-width="1.5"/>
  <text x="580" y="107" text-anchor="middle" font-weight="bold" fill="#1e40af">Contexts</text>
  <text x="580" y="123" text-anchor="middle" fill="#666" font-size="10">src/contexts/</text>
  <rect x="60" y="145" width="585" height="40" rx="6" fill="#bfdbfe" stroke="#3b82f6" stroke-width="1"/>
  <text x="350" y="170" text-anchor="middle" font-weight="bold" fill="#1e40af">@tanstack/react-table  •  RxJS  •  React Bootstrap  •  next-intl</text>
  <!-- Server Layer -->
  <rect x="40" y="230" width="620" height="120" rx="10" fill="#f0fdf4" stroke="#16a34a" stroke-width="2"/>
  <text x="60" y="252" font-weight="bold" fill="#166534" font-size="14">Next.js Server (SSR)</text>
  <rect x="60" y="265" width="180" height="50" rx="6" fill="#dcfce7" stroke="#4ade80" stroke-width="1.5"/>
  <text x="150" y="287" text-anchor="middle" font-weight="bold" fill="#166534">Middleware</text>
  <text x="150" y="303" text-anchor="middle" fill="#666" font-size="10">src/proxy.ts (Auth + i18n)</text>
  <rect x="260" y="265" width="180" height="50" rx="6" fill="#dcfce7" stroke="#4ade80" stroke-width="1.5"/>
  <text x="350" y="287" text-anchor="middle" font-weight="bold" fill="#166534">API Routes</text>
  <text x="350" y="303" text-anchor="middle" fill="#666" font-size="10">src/app/api/ (NextAuth)</text>
  <rect x="460" y="265" width="180" height="50" rx="6" fill="#dcfce7" stroke="#4ade80" stroke-width="1.5"/>
  <text x="550" y="287" text-anchor="middle" font-weight="bold" fill="#166534">Services</text>
  <text x="550" y="303" text-anchor="middle" fill="#666" font-size="10">src/services/</text>
  <!-- Type System Layer -->
  <rect x="40" y="380" width="620" height="100" rx="10" fill="#fefce8" stroke="#ca8a04" stroke-width="2"/>
  <text x="60" y="402" font-weight="bold" fill="#854d0e" font-size="14">Type System (Shared)</text>
  <rect x="60" y="415" width="290" height="50" rx="6" fill="#fef9c3" stroke="#facc15" stroke-width="1.5"/>
  <text x="205" y="437" text-anchor="middle" font-weight="bold" fill="#854d0e">Object Types</text>
  <text x="205" y="453" text-anchor="middle" fill="#666" font-size="10">src/object-types/ (TypeScript interfaces)</text>
  <rect x="370" y="415" width="270" height="50" rx="6" fill="#fef9c3" stroke="#facc15" stroke-width="1.5"/>
  <text x="505" y="437" text-anchor="middle" font-weight="bold" fill="#854d0e">Utilities</text>
  <text x="505" y="453" text-anchor="middle" fill="#666" font-size="10">src/utils/ (API client, env, common)</text>
  <!-- Arrows between layers -->
  <line x1="350" y1="200" x2="350" y2="225" stroke="#555" stroke-width="2" marker-end="url(#arrow2)"/>
  <line x1="350" y1="350" x2="350" y2="375" stroke="#555" stroke-width="2" marker-end="url(#arrow2)"/>
</svg>

