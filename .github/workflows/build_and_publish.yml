name: Build and Archive
on:
  push:
    tags: v*
    branches:
      - main
  pull_request:
    branches:
      - main
  workflow_dispatch:

jobs:
  linter_check:
    runs-on: ubuntu-24.04
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Markdown linting
        uses: DavidAnson/markdownlint-cli2-action@ded1f9488f68a970bc66ea5619e13e9b52e601cd # v23.2.0
        with:
          config: ".markdownlint-cli2.jsonc"

        continue-on-error: true

  build_website:
    name: Build and Archive
    runs-on: ubuntu-24.04
    needs: [ "linter_check" ]
    env:
      PROJECT_NAME: sw360
      PROJECT_BOT_NAME: SW360 Bot
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Setup Go
        uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
        with:
          go-version: ">=1.21.5"

      - name: Setup Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 22

      - name: Install postcss-cli
        run: npm ci

      - name: Setup Hugo
        uses: peaceiris/actions-hugo@75d2e84710de30f6ff7268e08f310b60ef14033f # v3.0.0
        with:
          hugo-version: "0.154.5"
          extended: true

      - uses: actions/cache@v5
        with:
          path: /tmp/hugo_cache
          key: ${{ runner.os }}-hugomod-${{ hashFiles('**/go.sum') }}
          restore-keys: |
            ${{ runner.os }}-hugomod-

      - name: Build SW360 Hugo
        shell: bash
        run: |
          mkdir -p themes/docsy
          hugo --minify -b 'https://eclipse.dev/sw360/'

      - name: Archive
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a  # v7.0.1
        with:
          name: website
          path: ./public

  main_publish:
    if: github.ref == 'refs/heads/main'
    name: Archive and Published Builds on main
    runs-on: ubuntu-latest
    needs: [ build_website ]
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - name: Download Artifact
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: website
          path: build_output

      - name: Push changes
        uses: JamesIves/github-pages-deploy-action@d92aa235d04922e8f08b40ce78cc5442fcfbfa2f # v4.8.0
        with:
          folder: build_output
          branch: main
          git-config-name: "SW360 Bot [bot]"
          git-config-email: "sw360-actions[bot]@users.noreply.github.com"
          repository-name: "eclipse-sw360/sw360.website.published"
          commit-message: "Website build ${{ github.workflow }}-${{ github.run_number }}"
          token: ${{ secrets.GH_PUBLISH_TOKEN }}

  create_release:
    if: startsWith(github.ref, 'refs/tags/')
    name: Archive and Published Tagged Build
    runs-on: ubuntu-latest
    needs: [ build_website ]
    steps:
      - name: Create Release
        id: create_release
        uses: actions/create-release@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tag_name: ${{ github.ref }}
          release_name: Release ${{ github.ref }}
          draft: false
          prerelease: false
        if: startsWith(github.ref, 'refs/tags/')

      - name: Download Artifact
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: website

      - name: Upload Release Asset
        id: upload-release-asset
        uses: actions/upload-release-asset@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          upload_url: ${{ steps.create_release.outputs.upload_url }}
          asset_path: ./website
          asset_name: website.zip
          asset_content_type: application/zip
        if: startsWith(github.ref, 'refs/tags/')
